<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Planning de la soirée</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">

  <header class="topbar">
    <div>
      <h1 id="event-title">Planning de la soirée</h1>
      <div class="subline">
        <span>20:00 → 01:00</span>
        <span class="clock" id="live-clock"></span>
      </div>
    </div>
    <div class="topbar-right">
      <span class="counter" id="counter">0 / 0 passés</span>
      <button class="reset-btn" id="reset-btn" type="button">Réinitialiser</button>
    </div>
  </header>

  <section class="next-panel" id="next-panel"></section>

  <section class="board">
    <div class="view-tabs" role="tablist">
      <button class="view-tab is-active" data-view="timeline" type="button" role="tab" aria-selected="true">Timeline</button>
      <button class="view-tab" data-view="list" type="button" role="tab" aria-selected="false">Liste</button>
    </div>

    <div class="view-panel" id="view-timeline" role="tabpanel">
      <div class="timeline-scroll" id="timeline-scroll">
        <div class="hour-axis" id="hour-axis"></div>
        <div class="tracks" id="tracks"></div>
      </div>
      <p class="scroll-hint">← scroll horizontal si beaucoup de monde en même temps →</p>
    </div>

    <div class="view-panel" id="view-list" role="tabpanel" hidden>
      <div class="list-items" id="list-items"></div>
    </div>
  </section>

  <p class="footnote">Les cases cochées se réinitialisent au rechargement de la page. Pour modifier les personnes, horaires, priorités ou commentaires, édite le fichier <code>data.js</code>.</p>

</div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  (function () {
    var clockEl = document.getElementById("live-clock");
    function tick() {
      var now = new Date();
      var h = String(now.getHours()).padStart(2, "0");
      var m = String(now.getMinutes()).padStart(2, "0");
      clockEl.textContent = h + ":" + m;
    }
    tick();
    setInterval(tick, 1000);
  })();
</script>
</body>
</html>
